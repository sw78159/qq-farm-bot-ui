name: Build UI Docker Image

on:
  workflow_dispatch:  # 允许手动按钮触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v3

      # 2. 安装 QEMU (这是构建 ARM64 镜像的关键环境)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      # 3. 安装 Docker Buildx (构建工具)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # 4. 登录 Docker Hub (使用您的密钥)
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. 开始构建并推送
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .                     # 上下文：整个项目根目录
          file: core/Dockerfile          # 关键点：告诉它图纸在 core 文件夹里！
          platforms: linux/amd64,linux/arm64 # 同时生成电脑版和N1版
          push: true                     # 推送到 Docker Hub
          # 自动用您的用户名生成镜像名：sw78159/qq-farm-bot-ui:latest
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/qq-farm-bot-ui:latest
